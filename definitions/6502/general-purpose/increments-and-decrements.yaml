instructions:
  - group: Increment/Decrement
    mnemonic: INC zp
    next_opcode: overlapped
    opcodes:
      - opcode: 0xE6
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = Data; request(action.memory_read);
      - Data = Data; request(action.memory_write);
      - Data = (Data + 1) & 0xFF; P = P & 0x7D; if is_zero(Data); P = P | 0x02; endif; if is_negative(Data); P = P | 0x80; endif; request(action.memory_write);
      -

  - group: Increment/Decrement
    mnemonic: INC zp,X
    next_opcode: overlapped
    opcodes:
      - opcode: 0xF6
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - Address = (AD + X) & 0x00FF; request(action.memory_read);
      - Data = Data; request(action.memory_write);
      - Data = (Data + 1) & 0xFF; P = P & 0x7D; if is_zero(Data); P = P | 0x02; endif; if is_negative(Data); P = P | 0x80; endif; request(action.memory_write);
      -

  - group: Increment/Decrement
    mnemonic: INC abs
    next_opcode: overlapped
    opcodes:
      - opcode: 0xEE
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - Address = (Data << 8) | AD; request(action.memory_read);
      - Data = Data; request(action.memory_write);
      - Data = (Data + 1) & 0xFF; P = P & 0x7D; if is_zero(Data); P = P | 0x02; endif; if is_negative(Data); P = P | 0x80; endif; request(action.memory_write);
      -

