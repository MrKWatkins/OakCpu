      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - AD = (Data << 8) | AD; Address = (AD & 0xFF00) | ((AD + X) & 0x00FF); request(action.memory_read);
      - Address = AD + X; request(action.memory_read);
      - Data = Data; request(action.memory_write);
      - Data = (Data + 1) & 0xFF; P = P & 0x7D; if is_zero(Data); P = P | 0x02; endif; if is_negative(Data); P = P | 0x80; endif; request(action.memory_write);
      -

  - group: Increment/Decrement
    mnemonic: INX
    next_opcode: overlapped
    opcodes:
      - opcode: 0xE8
    steps:
      - X = X + 1; flags();
    flags:
      Z: is_zero(X)
      N: is_negative(X)

  - group: Increment/Decrement
    mnemonic: DEX
    next_opcode: overlapped
    opcodes:
      - opcode: 0xCA
    steps:
      - X = X - 1; flags();
    flags:
      Z: is_zero(X)
      N: is_negative(X)

