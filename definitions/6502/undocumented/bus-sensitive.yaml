    mnemonic: "XAA #n"
    opcodes:
      - opcode: 0x8B
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - A = X & Data & (A | 0xEE); flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Undocumented
    mnemonic: LAS abs,Y
    next_opcode: custom
    opcodes:
      - opcode: 0xBB
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - AD = (Data << 8) | AD; Address = (AD & 0xFF00) | ((AD + Y) & 0x00FF); if !did_indexed_address_page_cross(AD, Y); move_to_sequence(sequence.las_finish); endif; request(action.memory_read);
      - Address = AD + Y; move_to_sequence(sequence.las_finish); request(action.memory_read);

  - group: Undocumented
    mnemonic: "AHX (zp),Y"
    next_opcode: overlapped
    opcodes:
      - opcode: 0x93
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - Address = (AD + 1) & 0x00FF; AD = Data; request(action.memory_read);
      - AD = AD | (Data << 8); Address = (AD & 0xFF00) | ((AD + Y) & 0x00FF); request(action.memory_read);
      - $value = A & X & high_byte_plus_one(AD); $target = AD + Y; if did_indexed_address_page_cross(AD, Y); $target = ($value << 8) | ($target & 0x00FF); endif; Address = $target; Data = $value; request(action.memory_write);
      -

