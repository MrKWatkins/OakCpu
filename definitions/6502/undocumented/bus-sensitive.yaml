sequences:
  - name: jam_read_ffff
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_read_fffe); request(action.memory_read);

  - name: jam_read_fffe
    next_opcode: custom
    steps:
      - Address = 0xFFFE; move_to_sequence(sequence.jam_read_fffe_again); request(action.memory_read);

  - name: jam_read_fffe_again
    next_opcode: custom
    steps:
      - Address = 0xFFFE; move_to_sequence(sequence.jam_spin_1); request(action.memory_read);

  - name: jam_spin_1
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_spin_2); request(action.memory_read);

  - name: jam_spin_2
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_spin_3); request(action.memory_read);

  - name: jam_spin_3
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_spin_4); request(action.memory_read);

  - name: jam_spin_4
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_spin_5); request(action.memory_read);

  - name: jam_spin_5
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_spin_6); request(action.memory_read);

  - name: jam_spin_6
    next_opcode: custom
    steps:
      - Address = 0xFFFF; move_to_sequence(sequence.jam_finish); request(action.memory_read);

  - name: jam_finish
    next_opcode: custom
    steps:
      - instruction_complete(false);

  - name: las_finish
    next_opcode: custom
    steps:
      - A = Data & S; X = A; S = A; P = P & 0x5D; if is_zero(A); P = P | 0x02; endif; if is_negative(A); P = P | 0x80; endif; instruction_complete(true);

