sequences:
  - name: adc_finish
    next_opcode: custom
    steps:
      - $carry = P & 0x01; $left = A; $right = Data; $binary_result = $left + $right + $carry; if flag.D; $low = ($left & 0x0F) + ($right & 0x0F) + $carry; $high = ($left & 0xF0) + ($right & 0xF0); P = P & 0x1C; if ($binary_result & 0xFF) == 0; P = P | 0x02; endif; if $low > 0x09; $high = $high + 0x10; $low = $low + 0x06; endif; if is_negative($high); P = P | 0x80; endif; if did_8_bit_addition_overflow($left, $right, $high); P = P | 0x40; endif; if $high > 0x90; $high = $high + 0x60; endif; if $high > 0xFF; P = P | 0x01; endif; A = ($low & 0x0F) | ($high & 0xF0); else; A = $binary_result; P = P & 0x1C; if did_8_bit_addition_overflow($left, $right, $binary_result); P = P | 0x40; endif; if ($binary_result & 0x0100) != 0; P = P | 0x01; endif; if is_zero(A); P = P | 0x02; endif; if is_negative(A); P = P | 0x80; endif; endif; instruction_complete(true);

instructions:
