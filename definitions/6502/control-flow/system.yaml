instructions:
  - group: System
    mnemonic: BRK
    opcodes:
      - opcode: 0x00
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = 0x0100 | S; Data = PC >> 8; S = S - 1; request(action.memory_write);
      - Address = 0x0100 | S; Data = PC & 0xFF; S = S - 1; request(action.memory_write);
      - Address = 0x0100 | S; Data = P | 0x30; P = P | 0x04; S = S - 1; request(action.memory_write);
      - Address = 0xFFFE; request(action.memory_read);
      - Address = 0xFFFF; AD = Data; request(action.memory_read);
      - PC = (Data << 8) | AD;

  - group: System
    mnemonic: RTI
    opcodes:
      - opcode: 0x40
    steps:
      - Address = PC; request(action.memory_read);
      - Address = 0x0100 | S; request(action.memory_read);
      - S = S + 1; Address = 0x0100 | S; request(action.memory_read);
      - S = S + 1; P = (Data & 0xEF) | 0x20; Address = 0x0100 | S; request(action.memory_read);
      - S = S + 1; AD = Data; Address = 0x0100 | S; request(action.memory_read);
      - PC = (Data << 8) | AD;
