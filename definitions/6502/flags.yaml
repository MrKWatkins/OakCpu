flags:
  - name: C
    index: 0
    documentation: Gets or sets the carry flag.

  - name: Z
    index: 1
    documentation: Gets or sets the zero flag.

  - name: I
    index: 2
    documentation: Gets or sets the interrupt disable flag.

  - name: D
    index: 3
    documentation: Gets or sets the decimal flag.

  - name: B
    index: 4
    documentation: Gets or sets the break flag.

  - name: V
    index: 6
    documentation: Gets or sets the overflow flag.

  - name: N
    index: 7
    documentation: Gets or sets the negative flag.
