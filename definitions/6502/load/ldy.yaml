sequences:
  - name: ldy_finish
    next_opcode: custom
    steps:
      - Y = Data; P = P & 0x5D; if is_zero(Y); P = P | 0x02; endif; if is_negative(Y); P = P | 0x80; endif; instruction_complete(true);

instructions:
  - group: Load
    mnemonic: "LDY #n"
    opcodes:
      - opcode: 0xA0
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Y = Data; flags();
    flags:
      Z: is_zero(Y)
      N: is_negative(Y)

  - group: Load
    mnemonic: LDY zp
    opcodes:
      - opcode: 0xA4
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = Data; request(action.memory_read);
      - Y = Data; flags();
    flags:
      Z: is_zero(Y)
      N: is_negative(Y)

  - group: Load
    mnemonic: LDY zp,X
    opcodes:
      - opcode: 0xB4
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - Address = (AD + X) & 0x00FF; request(action.memory_read);
      - Y = Data; flags();
    flags:
      Z: is_zero(Y)
      N: is_negative(Y)

  - group: Load
    mnemonic: LDY abs
    opcodes:
      - opcode: 0xAC
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - Address = (Data << 8) | AD; request(action.memory_read);
      - Y = Data; flags();
    flags:
      Z: is_zero(Y)
      N: is_negative(Y)

  - group: Load
    mnemonic: LDY abs,X
    next_opcode: custom
    opcodes:
      - opcode: 0xBC
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - AD = (Data << 8) | AD; Address = (AD & 0xFF00) | ((AD + X) & 0x00FF); if !did_indexed_address_page_cross(AD, X); move_to_sequence(sequence.ldy_finish); endif; request(action.memory_read);
      - Address = AD + X; move_to_sequence(sequence.ldy_finish); request(action.memory_read);
