sequences:
  - name: lda_finish
    next_opcode: custom
    steps:
      - A = Data; P = P & 0x5D; if is_zero(A); P = P | 0x02; endif; if is_negative(A); P = P | 0x80; endif; instruction_complete(true);

instructions:
  - group: Load
    mnemonic: "LDA #n"
    opcodes:
      - opcode: 0xA9
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - A = Data; flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Load
    mnemonic: LDA zp
    opcodes:
      - opcode: 0xA5
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = Data; request(action.memory_read);
      - A = Data; flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Load
    mnemonic: LDA zp,X
    opcodes:
      - opcode: 0xB5
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - Address = (AD + X) & 0x00FF; request(action.memory_read);
      - A = Data; flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Load
    mnemonic: LDA abs
    opcodes:
      - opcode: 0xAD
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - Address = (Data << 8) | AD; request(action.memory_read);
      - A = Data; flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Load
    mnemonic: LDA abs,X
    next_opcode: custom
    opcodes:
      - opcode: 0xBD
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - AD = (Data << 8) | AD; Address = (AD & 0xFF00) | ((AD + X) & 0x00FF); if !did_indexed_address_page_cross(AD, X); move_to_sequence(sequence.lda_finish); endif; request(action.memory_read);
      - Address = AD + X; move_to_sequence(sequence.lda_finish); request(action.memory_read);

  - group: Load
    mnemonic: LDA abs,Y
    next_opcode: custom
    opcodes:
      - opcode: 0xB9
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - AD = (Data << 8) | AD; Address = (AD & 0xFF00) | ((AD + Y) & 0x00FF); if !did_indexed_address_page_cross(AD, Y); move_to_sequence(sequence.lda_finish); endif; request(action.memory_read);
      - Address = AD + Y; move_to_sequence(sequence.lda_finish); request(action.memory_read);

  - group: Load
    mnemonic: "LDA (zp,X)"
    opcodes:
      - opcode: 0xA1
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - AD = (AD + X) & 0x00FF; Address = AD; request(action.memory_read);
      - Address = (AD + 1) & 0x00FF; AD = Data; request(action.memory_read);
      - Address = (Data << 8) | AD; request(action.memory_read);
      - A = Data; flags();
    flags:
      Z: is_zero(A)
      N: is_negative(A)

  - group: Load
    mnemonic: "LDA (zp),Y"
    next_opcode: custom
    opcodes:
      - opcode: 0xB1
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - AD = Data; Address = AD; request(action.memory_read);
      - Address = (AD + 1) & 0x00FF; AD = Data; request(action.memory_read);
      - AD = AD | (Data << 8); Address = (AD & 0xFF00) | ((AD + Y) & 0x00FF); if !did_indexed_address_page_cross(AD, Y); move_to_sequence(sequence.lda_finish); endif; request(action.memory_read);
      - Address = AD + Y; move_to_sequence(sequence.lda_finish); request(action.memory_read);
