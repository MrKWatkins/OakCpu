instructions:
  - group: Logical
    mnemonic: BIT zp
    opcodes:
      - opcode: 0x24
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = Data; request(action.memory_read);
      - $result = A & Data; flags();
    flags:
      Z: is_zero($result)
      V: (Data & 0x40) != 0
      N: is_negative(Data)

  - group: Logical
    mnemonic: BIT abs
    opcodes:
      - opcode: 0x2C
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - Address = PC; PC = PC + 1; AD = Data; request(action.memory_read);
      - Address = (Data << 8) | AD; request(action.memory_read);
      - $result = A & Data; flags();
    flags:
      Z: is_zero($result)
      V: (Data & 0x40) != 0
      N: is_negative(Data)
