cpu:
  name: M6502
  documentation: Provides generated MOS 6502 CPU emulators.
  default_next_opcode: overlapped
  actions:
    - name: opcode_read
      documentation: The host must read an opcode byte from memory.

    - name: memory_read
      documentation: The host must read a byte from memory.

    - name: memory_write
      documentation: The host must write a byte to memory.

  fields:
    - name: AD
      type: u16
      documentation: Internal address scratch register.

    - name: InterruptVector
      type: u16
      documentation: Internal scratch address for the active interrupt vector.

    - name: PendingNMI
      type: bool
      documentation: Tracks whether an NMI edge has been latched for servicing.

    - name: PreviousNMI
      type: bool
      documentation: Tracks the previous NMI line state for edge detection.

    - name: SampledIRQ
      type: bool
      documentation: Tracks the IRQ line state sampled on the previous T-state.

on_step_complete: |
  SampledIRQ = IRQ;
  if NMI & !PreviousNMI;
    PendingNMI = true;
  endif;
  PreviousNMI = NMI;

sequences:
  - name: opcode_read
    execute_overlap_on_start: true
    next_opcode: custom
    steps:
      - Address = PC; PC = PC + 1; request(action.opcode_read);
      - move_to_opcode();
