    opcodes:
      - opcode: 0xCB 0x26
    steps:
      - Address = HL; request(action.memory_read);
      -
      -
      - $temp = Data; Data = Data << 1; flags();
      - request(action.memory_write); # Skipping setting Address = HL as it should still contain HL. Skipping setting Data as it should still contain Data + 1.
      -
      -
    flags:
      C: ($temp & 0x80) == 0x80
      N: 0
      PV: even_parity(Data)
      X: copy_from(Data)
      H: 0
      Y: copy_from(Data)
      Z: is_zero(Data)
      S: copy_from(Data)
    next_opcode: overlapped
    
