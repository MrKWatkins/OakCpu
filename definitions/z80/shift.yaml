instructions:
  - group: SLA
    mnemonic: SLA R0
    opcodes:
      - opcode: 0xCB 0x20
        R0: B
      - opcode: 0xCB 0x21
        R0: C
      - opcode: 0xCB 0x22
        R0: D
      - opcode: 0xCB 0x23
        R0: E
      - opcode: 0xCB 0x24
        R0: H
      - opcode: 0xCB 0x25
        R0: L
      - opcode: 0xCB 0x27
        R0: A
    steps:
      - $temp = R0; R0 = R0 << 1; flags();
    flags:
      # TODO: Make an I32Bool so we can avoid the conditional and just shift. Maybe an is_set() function?
      C: ($temp & 0x80) == 0x80
      N: 0
      PV: even_parity(R0)
      X: copy_from(R0)
      H: 0
      Y: copy_from(R0)
      Z: is_zero(R0)
      S: copy_from(R0)
    next_opcode: overlapped
  
  - group: SLA
