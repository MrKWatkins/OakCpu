instructions:
  - group: NEG
    mnemonic: NEG
    opcodes:
      - opcode: 0xED 0x44
      - opcode: 0xED 0x4C
      - opcode: 0xED 0x54
      - opcode: 0xED 0x5C
      - opcode: 0xED 0x64
      - opcode: 0xED 0x6C
      - opcode: 0xED 0x74
      - opcode: 0xED 0x7C
    steps:
      - $value = A; A = 0 - $value; flags();
    flags:
      C: A != 0
      N: 1
      PV: A == 0x80
      X: copy_from(A)
      # If bit 5 has changed, we have a half-carry.
      H: (($value ^ A) & 0x10) != 0)
      Y: copy_from(A)
      Z: is_zero(A)
      S: copy_from(A)
    next_opcode: overlapped
