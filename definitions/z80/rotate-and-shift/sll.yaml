instructions:
  - group: Rotate and Shift
    mnemonic: SLL R0
    opcodes:
      - opcode: 0xCB 0x30
        R0: B
      - opcode: 0xCB 0x31
        R0: C
      - opcode: 0xCB 0x32
        R0: D
      - opcode: 0xCB 0x33
        R0: E
      - opcode: 0xCB 0x34
        R0: H
      - opcode: 0xCB 0x35
        R0: L
      - opcode: 0xCB 0x37
        R0: A
    steps:
      - $temp = R0; R0 = (R0 << 1) | 0x01; flags();
    flags:
      C: ($temp & 0x80) == 0x80
      N: 0
      PV: even_parity(R0)
      X: copy_from(R0)
      H: 0
      Y: copy_from(R0)
      Z: is_zero(R0)
      S: copy_from(R0)

