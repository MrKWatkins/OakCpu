        R0: H
      - opcode: 0xCB 0x0D
        R0: L
      - opcode: 0xCB 0x0F
        R0: A
    steps:
      - $temp = R0; R0 = (R0 >> 1) | (R0 << 7); flags();
    flags:
      C: copy_from($temp)
      N: 0
      PV: even_parity(R0)
      X: copy_from(R0)
      H: 0
      Y: copy_from(R0)
      Z: is_zero(R0)
      S: copy_from(R0)

