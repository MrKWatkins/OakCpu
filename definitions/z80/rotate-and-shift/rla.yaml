instructions:
  - group: Rotate and Shift
    mnemonic: RLA
    opcodes:
      - opcode: 0x17
      - opcode: 0xDD 0x17
      - opcode: 0xFD 0x17
    steps:
      - $temp = A; A = (A << 1) | flag.C; flags();
    flags:
      C: ($temp & 0x80) == 0x80
      N: 0
      X: copy_from(A)
      H: 0
      Y: copy_from(A)
