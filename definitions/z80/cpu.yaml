cpu:
  name: Z80
  # TODO: Capitalise IO in the C#.
  actions:
    - opcode_read
    - memory_read
    - memory_write
    - io_read
    - io_write

  fields:
    - name: latch
      type: u8
      
    - name: instruction_complete
      type: bool
      getter: true
      setter: true

opcode_read:
  # PC moves to the next instruction after a HALT. The next opcode is then repeatedly read, but PC is not advanced and the instruction is not executed 
  # until the CPU is no longer halted. See http://www.primrosebank.net/computers/z80/z80_special_reset.htm for details.
  - Address = PC; if !halted; PC = PC + 1; endif; request(action.opcode_read);
  - 
  - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
  - if halted; Q = 0; instruction_complete = true; current_step = 0; handle_interrupts(); else; move_to_opcode(); endif;

on_instruction_complete: |
  if instruction_updates_flags();
    Q = F;
  else;
    Q = 0;
  endif;
  
  instruction_complete = true;
  
  handle_interrupts();

instructions:    
  - group: Redirects
    mnemonic: DDCB Redirect
    opcodes:
      - opcode: 0xDD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.DDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: DDED Redirect
    opcodes:
      - opcode: 0xDD 0xED
    steps:
      - set_opcode_step_table(0xED);
    next_opcode: overlapped

  - group: Redirects
    mnemonic: DDFD Redirect
    opcodes:
      - opcode: 0xDD 0xFD
    steps:
      - set_opcode_step_table(0xFD);
    next_opcode: overlapped
    
  - group: Redirects
    mnemonic: FDCB Redirect
    opcodes:
      - opcode: 0xFD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.FDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: FDED Redirect
    opcodes:
      - opcode: 0xFD 0xED
    steps:
      - set_opcode_step_table(0xED);
    next_opcode: overlapped

  - group: Redirects
    mnemonic: FDDD Redirect
    opcodes:
      - opcode: 0xFD 0xDD
    steps:
      - set_opcode_step_table(0xDD);
    next_opcode: overlapped