# TODO: get_bit function.
cpu:
  name: Z80
  documentation: Provides generated Z80 CPU emulators.
  default_next_opcode: overlapped
  actions:
    - name: opcode_read
      documentation: The host must read an opcode byte from memory.

    - name: memory_read
      documentation: The host must read a byte from memory.

    - name: memory_write
      documentation: The host must write a byte to memory.

    - name: io_read
      documentation: The host must read a byte from an I/O port.

    - name: io_write
      documentation: The host must write a byte to an I/O port.

  fields:
    - name: latch
      type: u8

sequences:
  - name: opcode_read
    execute_overlap_on_start: true
    next_opcode: custom
    steps:
      - Address = PC; PC = PC + 1; request(action.opcode_read);
      - 
      - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
      - move_to_opcode();

on_instruction_complete: |
  if instruction_updates_flags();
    Q = F;
  else;
    Q = 0;
  endif;
  
  handle_interrupts();

instructions:    
  - group: Redirects
    mnemonic: DDCB Redirect
    opcodes:
      - opcode: 0xDD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.DDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: DDED Redirect
    opcodes:
      - opcode: 0xDD 0xED
    steps:
      - set_opcode_step_table(0xED);

  - group: Redirects
    mnemonic: DDFD Redirect
    opcodes:
      - opcode: 0xDD 0xFD
    steps:
      - set_opcode_step_table(0xFD);
    
  - group: Redirects
    mnemonic: FDCB Redirect
    opcodes:
      - opcode: 0xFD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.FDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: FDED Redirect
    opcodes:
      - opcode: 0xFD 0xED
    steps:
      - set_opcode_step_table(0xED);

  - group: Redirects
    mnemonic: FDDD Redirect
    opcodes:
      - opcode: 0xFD 0xDD
    steps:
      - set_opcode_step_table(0xDD);
