cpu:
  name: Z80
  # TODO: Capitalise IO in the C#.
  actions:
    - opcode_read
    - memory_read
    - memory_write
    - io_read
    - io_write

  fields:
    - name: latch
      type: u8

opcode_read:
  - Address = PC; PC = PC + 1; request(action.opcode_read);
  - 
  - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
  - move_to_opcode();

on_instruction_complete: if instruction_updates_flags(); Q = F; else; Q = 0; endif;

instructions:    
  - group: Redirects
    mnemonic: DDCB Redirect
    opcodes:
      - opcode: 0xDD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.DDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: DDED Redirect
    opcodes:
      - opcode: 0xDD 0xED
    steps:
      - set_opcode_step_table(0xED);
    next_opcode: overlapped

  - group: Redirects
    mnemonic: DDFD Redirect
    opcodes:
      - opcode: 0xDD 0xFD
    steps:
      - set_opcode_step_table(0xFD);
    next_opcode: overlapped
    
  - group: Redirects
    mnemonic: FDCB Redirect
    opcodes:
      - opcode: 0xFD 0xCB
    steps:
      - set_opcode_step_table(opcode_table.FDCB); Address = PC; PC = PC + 1; request(action.memory_read);
      - latch = Data;
      -
      - Address = PC; PC = PC + 1; request(action.memory_read);
      - 
      - move_to_opcode(); set_opcode_step_table();
    next_opcode: custom

  - group: Redirects
    mnemonic: FDED Redirect
    opcodes:
      - opcode: 0xFD 0xED
    steps:
      - set_opcode_step_table(0xED);
    next_opcode: overlapped

  - group: Redirects
    mnemonic: FDDD Redirect
    opcodes:
      - opcode: 0xFD 0xDD
    steps:
      - set_opcode_step_table(0xDD);
    next_opcode: overlapped