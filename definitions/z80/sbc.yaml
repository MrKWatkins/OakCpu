instructions:
  - group: SBC
    mnemonic: SBC R0
    opcodes:
      - opcode: 0x98
        R0: B
      - opcode: 0x99
        R0: C
      - opcode: 0x9A
        R0: D
      - opcode: 0x9B
        R0: E
      - opcode: 0x9C
        R0: H
      - opcode: 0x9D
        R0: L
      - opcode: 0x9F
        R0: A
    steps:
      - [$left = A, $right = R0, $result = $left - $right - flag.C, A = $result, flags()]
    flags:
      C: ($result & 0x100) == 0x100
      N: 1
      PV: did_8_bit_subtraction_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_subtraction_half_borrow($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero($result)
      S: copy_from($result)
    next_opcode: overlapped

  - group: SBC
    mnemonic: SBC (HL)
    opcodes:
      - opcode: 0x9E
    steps:
      - [Address = HL, MemoryRead]
      - []
      - [$left = A, $right = Data, $result = $left - $right - flag.C, A = $result, flags()]
    flags:
      C: ($result & 0x100) == 0x100
      N: 1
      PV: did_8_bit_subtraction_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_subtraction_half_borrow($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero($result)
      S: copy_from($result)
    next_opcode: overlapped
