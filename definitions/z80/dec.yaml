instructions:
  - group: DEC
    mnemonic: DEC R0
    opcodes:
      - opcode: 0x05
        R0: B
      - opcode: 0x0D
        R0: C
      - opcode: 0x15
        R0: D
      - opcode: 0x1D
        R0: E
      - opcode: 0x25
        R0: H
      - opcode: 0x2D
        R0: L
      - opcode: 0x3D
        R0: A
    steps:
      - [R0 = R0 - 1, flags()]
    flags:
      N: 1
      PV: R0 == 0x7F
      X: copy_from(R0)
      H: (R0 & 0x0F) == 0x0F
      Y: copy_from(R0)
      Z: is_zero(R0)
      S: is_negative(R0)
    next_opcode: overlapped
    
  - group: DEC
    mnemonic: DEC (HL)
    opcodes:
      - opcode: 0x35
    steps:
      - [Address = HL, MemoryRead]
      - [Data = Data - 1, flags()]
      - []
      - []
      - [MemoryWrite] # Skipping Address = HL as it should still contain HL. Data should still contain Data + 1.
      - []
      - []
    flags:
      N: 1
      PV: Data == 0x7F
      X: copy_from(Data)
      H: (Data & 0x0F) == 0x0F
      Y: copy_from(Data)
      Z: is_zero(Data)
      S: is_negative(Data)
    next_opcode: overlapped