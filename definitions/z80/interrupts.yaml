interrupts:
  properties:
    - name: IM
      type: u8
      
    - name: IFF1
      type: bool

    - name: IFF2
      type: bool
    
    - name: halted
      type: bool
      
      # Not bothering with NMI.
    - name: interrupt
      type: bool
  
  handle: |
    if interrupt && IFF1;
      halted = false;     
      move_to_interrupt_mode(IM);
      interrupt = false;
      handled();
    endif;
  
  # Move to a separate cycle of opcodes after a HALT. This is to avoid the overhead of checking for halted in opcode_read.
  halted_cycle:
    # PC moves to the next instruction after a HALT. The next opcode is then repeatedly read, but PC is not advanced and the instruction is not executed 
    # until the CPU is no longer halted. See http://www.primrosebank.net/computers/z80/z80_special_reset.htm for details.
    - Address = PC; request(action.opcode_read);
    -
    - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
    # No need to reset Q as it was reset by the HALT that started the cycle.
    - instruction_complete = true; handle_interrupts();

  modes:
    - number: 0
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - 
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        - move_to_opcode();
      next_opcode: custom
      
    - number: 1
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - 
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCH; request(action.memory_write);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCL; PC = 0x38; WZ = 0x38; request(action.memory_write);
        -
        -
    
    - number: 2
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - latch = Data;
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCH; request(action.memory_write);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCL; Z = latch; W = I; request(action.memory_write);
        -
        -
        - Address = WZ; WZ = WZ + 1; request(action.memory_read);
        - latch = Data;
        -
