interrupts:
  properties:
    - name: IM
      type: u8
      
    - name: IFF1
      type: bool

    - name: IFF2
      type: bool
    
    - name: halted
      type: bool
      
      # Not bothering with NMI.
    - name: interrupt
      type: bool
  
  handle: |
    if interrupt && IFF1;
      halted = false;     
      move_to_interrupt_mode(IM);
      interrupt = false;
      handled();
    endif;
  
  # Move to a separate cycle of opcodes after a HALT. This is to avoid the overhead of checking for halted in opcode_read.
  halted_cycle:
    # PC moves to the next instruction after a HALT. The next opcode is then repeatedly read, but PC is not advanced and the instruction is not executed 
    # until the CPU is no longer halted. See http://www.primrosebank.net/computers/z80/z80_special_reset.htm for details.
    - Address = PC; request(action.opcode_read);
    -
    - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
    # No need to reset Q as it was reset by the HALT that started the cycle.
    - instruction_complete = true; handle_interrupts();

  modes:
    - number: 0
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - 
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        - move_to_opcode();
      next_opcode: custom
      
    - number: 1
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - 
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCH; request(action.memory_write);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCL; PC = 0x38; WZ = 0x38; request(action.memory_write);
        -
        -
    
    - number: 2
      steps:
        - IFF1 = false; IFF2 = false;
        - request(action.io_read);
        - latch = Data;
        - Address = IR; R = (R & 0x80) | ((R + 1) & 0x7F);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCH; request(action.memory_write);
        -
        -
        - SP = SP - 1; Address = SP; Data = PCL; Z = latch; W = I; request(action.memory_write);
        -
        -
        - Address = WZ; WZ = WZ + 1; request(action.memory_read);
        - latch = Data;
        -
        - Address = WZ; request(action.memory_read);
        - W = Data; Z = latch; PC = WZ;
        - 

instructions:
  - group: Interrupts
    mnemonic: HALT
    opcodes:
      - opcode: 0x76
      - opcode: 0xDD 0x76
      - opcode: 0xFD 0x76
    steps:
      # PC moves to the next instruction after a HALT. The next opcode is then repeatedly read, but PC is not advanced and the instruction is not executed 
      # until the CPU is no longer halted. See http://www.primrosebank.net/computers/z80/z80_special_reset.htm for details.
      # We use a special cycle for this to avoid the overhead of having to check halted during a normal opcode read cycle.
      # TODO: Annoying we have to have the memory_read here. Can we make more generic too? Arbitrary custom cycles for stuff like halted? Arbitrary sets of custom cycles for stuff like modes?
      - Q = 0; instruction_complete = true; halted = true; handle_interrupts(); move_to_halted_cycle(); request(action.opcode_read);
    next_opcode: custom
    
  - group: Interrupts
    mnemonic: DI
    opcodes:
      - opcode: 0xF3
      - opcode: 0xDD 0xF3
      - opcode: 0xFD 0xF3
    steps:
      - IFF1 = false; IFF2 = false;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: EI
    opcodes:
      - opcode: 0xFB
      - opcode: 0xDD 0xFB
      - opcode: 0xFD 0xFB
    steps:
      # Use custom so the standard on_instruction_complete (which handles interrupts) *isn't* executed. This is to prevent interrupts firing inside EI.
      # We then have to manually include the reset of Q, instruction_complete = true and overlapped memory read. 
      - IFF1 = true; IFF2 = true; Q = 0; instruction_complete = true; Address = PC; current_step = 1; request(action.opcode_read);
    next_opcode: custom
    
  - group: Interrupts
    mnemonic: IM 0
    opcodes:
      - opcode: 0xED 0x46
      - opcode: 0xED 0x4E
      - opcode: 0xED 0x66
      - opcode: 0xED 0x6E
    steps:
      - IM = 0;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: IM 1
    opcodes:
      - opcode: 0xED 0x56
      - opcode: 0xED 0x76
    steps:
      - IM = 1;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: IM 2
    opcodes:
      - opcode: 0xED 0x5E
      - opcode: 0xED 0x7E
    steps:
      - IM = 2;
    next_opcode: overlapped