interrupts:
  properties:
    - name: IM
      type: u8
      
    - name: IFF1
      type: bool
      
    - name: IFF2
      type: bool
    
    - name: is_halted
      type: bool

instructions:
  - group: Interrupts
    mnemonic: HALT
    opcodes:
      - opcode: 0x76
      - opcode: 0xDD 0x76
      - opcode: 0xFD 0x76
    steps:
      - is_halted = true;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: DI
    opcodes:
      - opcode: 0xF3
      - opcode: 0xDD 0xF3
      - opcode: 0xFD 0xF3
    steps:
      - IFF1 = false; IFF2 = false;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: EI
    opcodes:
      - opcode: 0xFB
      - opcode: 0xDD 0xFB
      - opcode: 0xFD 0xFB
    steps:
      - IFF1 = true; IFF2 = true;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: IM 0
    opcodes:
      - opcode: 0xED 0x46
      - opcode: 0xED 0x4E
      - opcode: 0xED 0x66
      - opcode: 0xED 0x6E
    steps:
      - IM = 0;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: IM 1
    opcodes:
      - opcode: 0xED 0x56
      - opcode: 0xED 0x76
    steps:
      - IM = 1;
    next_opcode: overlapped
    
  - group: Interrupts
    mnemonic: IM 2
    opcodes:
      - opcode: 0xED 0x5E
      - opcode: 0xED 0x7E
    steps:
      - IM = 2;
    next_opcode: overlapped