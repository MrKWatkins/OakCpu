instructions:
  - group: INC
    mnemonic: INC R0
    opcodes:
      - opcode: 0x04
        R0: B
      - opcode: 0x0C
        R0: C
      - opcode: 0x14
        R0: D
      - opcode: 0x1C
        R0: E
      - opcode: 0x24
        R0: H
      - opcode: 0x2C
        R0: L
      - opcode: 0x3C
        R0: A
    steps:
      - [R0 = R0 + 1, flags()]
    flags:
      N: 0
      PV: R0 == 0x80
      X: copy_from(R0)
      H: (R0 & 0x0F) == 0x00
      Y: copy_from(R0)
      Z: is_zero(R0)
      S: is_negative(R0)
    next_opcode: overlapped
    
  - group: INC
    mnemonic: INC (HL)
    opcodes:
      - opcode: 0x34
    steps:
      - [Address = HL, MemoryRead]
      - []
      - []
      - [Data = Data + 1, flags()]
      - [MemoryWrite] # Skipping setting Address = HL as it should still contain HL. Skipping setting Data as it should still contain Data + 1.
      - []
      - []
    flags:
      N: 0
      PV: Data == 0x80
      X: copy_from(Data)
      H: (Data & 0x0F) == 0x00
      Y: copy_from(Data)
      Z: is_zero(Data)
      S: is_negative(Data)
    next_opcode: overlapped