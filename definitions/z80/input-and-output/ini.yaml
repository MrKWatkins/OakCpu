instructions:
  - group: Input and Output
    mnemonic: INI
    opcodes:
      - opcode: 0xED 0xA2
    steps:
      -
      - Address = BC;
      - request(action.io_read);
      - WZ = BC + 1; B = B - 1;
      - 
      - |
        Address = HL;
        HL = HL + 1;
        request(action.memory_write);
  
        $carry_modifier = C + 1;
        $temp = Data + ($carry_modifier & 0xFF);
        $pv = (($temp & 0x07) ^ B);
        flags();
      -
      -
    flags:
      C: $temp > 0xFF
      N: is_negative(Data)
      PV: even_parity($pv)
      X: copy_from(B)
      H: $temp > 0xFF
      Y: copy_from(B)
      Z: B == 0
      S: is_negative(B)
