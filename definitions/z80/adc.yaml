instructions:       
  - group: ADC
    mnemonic: ADC A, R0
    opcodes:
      - opcode: 0x88
        R0: B
      - opcode: 0x89
        R0: C
      - opcode: 0x8A
        R0: D
      - opcode: 0x8B
        R0: E
      - opcode: 0x8C
        R0: H
      - opcode: 0x8D
        R0: L
      - opcode: 0x8F
        R0: A
    steps:
      - $left = A; $right = R0; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero(A) # Must take from A rather than $result as $result is an Int32 and could be not zero when A is zero.
      S: copy_from($result)
    next_opcode: overlapped

  - group: ADC
    mnemonic: ADC A, n
    opcodes:
      - opcode: 0xCE
    steps:
      - Address = PC; PC = PC + 1; request(action.memory_read);
      -
      - $left = A; $right = Data; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero(A)
      S: copy_from($result)
    next_opcode: overlapped
    
  - group: ADC
    mnemonic: ADC A, (HL)
    opcodes:
      - opcode: 0x8E
    steps:
      - Address = HL; request(action.memory_read);
      - 
      - $left = A; $right = Data; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero(A)
      S: copy_from($result)
    next_opcode: overlapped
    
  - group: ADC
    mnemonic: ADC HL, RP0
    opcodes:
      - opcode: 0xED 0x4A
        RP0: BC
      - opcode: 0xED 0x5A
        RP0: DE
      - opcode: 0xED 0x6A
        RP0: HL
      - opcode: 0xED 0x7A
        RP0: SP
    steps:
      - $left = HL; $right = RP0; $result = $left + $right + flag.C; HL = $result; WZ = $left + 1; flags();
      -
      -
      -
      -
      -
      -
    flags:
      C: ($result & 0x10000) == 0x10000
      N: 0
      PV: did_16_bit_addition_overflow($left, $right, $result)
      X: copy_from(H)
      H: did_16_bit_addition_half_carry($left, $right, $result)
      Y: copy_from(H)
      Z: is_zero(HL)
      S: copy_from(H)
