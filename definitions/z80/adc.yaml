instructions:       
  - group: ADC
    mnemonic: ADC A, R0
    opcodes:
      - opcode: 0x88
        R0: B
      - opcode: 0x89
        R0: C
      - opcode: 0x8A
        R0: D
      - opcode: 0x8B
        R0: E
      - opcode: 0x8C
        R0: H
      - opcode: 0x8D
        R0: L
      - opcode: 0x8F
        R0: A
    steps:
      - $left = A; $right = R0; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero($result)
      S: copy_from($result)
    next_opcode: overlapped

  - group: ADC
    mnemonic: ADC A, n
    opcodes:
      - opcode: 0xCE
    steps:
      - Address = PC; PC = PC + 1; memory_read();
      -
      - $left = A; $right = Data; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero($result)
      S: copy_from($result)
    next_opcode: overlapped
    
  - group: ADC
    mnemonic: ADC A; (HL)
    opcodes:
      - opcode: 0x8E
    steps:
      - Address = HL; memory_read();
      - 
      - $left = A; $right = Data; $result = $left + $right + flag.C; A = $result; flags();
    flags:
      C: ($result & 0x100) == 0x100
      N: 0
      PV: did_8_bit_addition_overflow($left, $right, $result)
      X: copy_from($result)
      H: did_8_bit_addition_half_carry($left, $right, $result)
      Y: copy_from($result)
      Z: is_zero($result)
      S: copy_from($result)
    next_opcode: overlapped
