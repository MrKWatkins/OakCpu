instructions:
  - group: General-Purpose Arithmetic and CPU Control
    mnemonic: SCF
    opcodes:
      - opcode: 0x37
    steps:
      - $xy = (Q ^ F) | A; flags();
    flags:
      C: 1
      N: 0
      X: copy_from($xy)
      H: 0
      Y: copy_from($xy)
    next_opcode: overlapped

  - group: General-Purpose Arithmetic and CPU Control
    mnemonic: SCF
    # DD/FD act as the previous instruction for SCF's undocumented X/Y flag behaviour.
    # They do not modify flags, so X/Y are copied from F | A rather than (Q ^ F) | A.
    # See https://stardot.org.uk/forums/viewtopic.php?p=481595#p481595.
    opcodes:
      - opcode: 0xDD 0x37
      - opcode: 0xFD 0x37
    steps:
      - $xy = F | A; flags();
    flags:
      C: 1
      N: 0
      X: copy_from($xy)
      H: 0
      Y: copy_from($xy)
    next_opcode: overlapped
