instructions:
  - group: General-Purpose Arithmetic and CPU Control
    mnemonic: HALT
    opcodes:
      - opcode: 0x76
      - opcode: 0xDD 0x76
      - opcode: 0xFD 0x76
    steps:
      # PC moves to the next instruction after a HALT. The next opcode is then repeatedly read, but PC is not advanced and the instruction is not executed 
      # until the CPU is no longer halted. See http://www.primrosebank.net/computers/z80/z80_special_reset.htm for details.
      # We use a special cycle for this to avoid the overhead of having to check halted during a normal opcode read cycle.
      - halted = true;
    next_opcode: overlapped
    overlapped_sequence: halted
