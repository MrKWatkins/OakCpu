name: Build

on:
  push:
  pull_request:

jobs:
  BuildAndTest:
    name: Build and Test
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Verify Code Is Correctly Formatted
        continue-on-error: true
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-restore --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*.Testing]*

      - name: Test Report
        uses: dorny/test-reporter@v1.9.1
        if: success() || failure()
        with:
          name: Test Results
          path: "**/TestResults/test-results.trx"
          reporter: dotnet-trx

      - name: Aggregate Coverage Reports
        run: |
          dotnet new tool-manifest
          dotnet tool install dotnet-reportgenerator-globaltool
          dotnet tool run reportgenerator "-reports:**/TestResults/**/coverage.cobertura.xml" "-targetdir:." "-reportTypes:Cobertura"

      - name: Generate Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: Cobertura.xml
          format: markdown
          indicators: true
          output: file
          thresholds: '50 60'

      - name: Attach Coverage Report to Build
        uses: dtinth/markdown-report-action@v1
        with:
          name: Test Coverage
          title: Test Coverage
          body-file: code-coverage-results.md